name: service_me
description: Service Me - Aplikasi Servis Gadget
publish_to: none
version: 1.0.1+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  supabase_flutter: ^2.8.1
  image_picker: ^1.1.2
  intl: ^0.20.0
  shared_preferences: ^2.3.0
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  m3_expressive: ^1.0.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0891B2"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 23

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
