# Flutter/Dart analysis options — strict mode
# Based on ECC flutter-dart-code-review best practices

include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    invalid_annotation_target: ignore
    missing_return: error
    dead_code: warning

  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    # ─── Const (ECC: prefer const over runtime values) ───
    prefer_const_constructors: true
    prefer_const_declarations: true
    prefer_const_literals_to_create_immutables: true

    # ─── Final/var (ECC: prefer final for locals) ───
    prefer_final_locals: true
    unnecessary_var: true

    # ─── Null safety (ECC: avoid !, prefer ?./??) ───
    avoid_bang: true

    # ─── Imports (ECC: prefer package: imports) ───
    prefer_relative_imports: false
    always_use_package_imports: false

    # ─── Error handling (ECC: catch with types) ───
    only_throw_errors: true
    use_build_context_synchronously: true

    # ─── Code quality (ECC checklist) ───
    avoid_print: false
    no_duplicate_case_values: true
    prefer_if_elements_to_conditional_expressions: true
    require_trailing_commas: false
    sort_child_properties_last: true
    use_key_in_widget_constructors: true
    use_super_parameters: true
