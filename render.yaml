services:
  - type: web
    name: servisgadget-api
    runtime: docker
    plan: free
    healthCheckPath: /v1/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_STORE_ACCESS_SECRET
        sync: false
      - key: JWT_STORE_REFRESH_SECRET
        sync: false
      - key: JWT_PLATFORM_ADMIN_SECRET
        sync: false
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
      - key: PORT
        value: "3000"
