services:
  - type: web
    name: servisgadget-api
    runtime: docker
    plan: free
    healthCheckPath: /v1/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_STORE_ACCESS_SECRET
        sync: false
      - key: JWT_STORE_REFRESH_SECRET
        sync: false
      - key: JWT_PLATFORM_ADMIN_SECRET
        sync: false
      - key: CREDENTIAL_ENCRYPTION_KEY
        sync: false
      - key: REDIS_HOST
        sync: false
      - key: REDIS_PORT
        value: "6379"
      - key: WA_GATEWAY_URL
        sync: false
      - key: WA_GATEWAY_TOKEN
        sync: false
      - key: WA_SENDER_NUMBER
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: STORE_EMAIL
        sync: false
      - key: APP_URL
        sync: false
      - key: PORT
        value: "3000"
      - key: NODE_ENV
        value: "production"
