# =============================================
# Local Development Environment
# =============================================
# Usage: docker compose up -d
# Status: docker compose ps
# Logs: docker compose logs -f backend
# Stop: docker compose down

services:
  postgres:
    image: postgres:16-alpine
    container_name: servisgadget_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: servisgadget
      POSTGRES_PASSWORD: servisgadget
      POSTGRES_DB: servisgadget
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servisgadget -d servisgadget"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1024M

  redis:
    image: redis:7-alpine
    container_name: servisgadget_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build:
      context: ./backend
    container_name: servisgadget_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/v1/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1024M

volumes:
  postgres_data:
  redis_data:
