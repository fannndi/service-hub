services:
  postgres:
    image: postgres:16-alpine
    container_name: servisgadget_postgres
    environment:
      POSTGRES_USER: servisgadget
      POSTGRES_PASSWORD: servisgadget
      POSTGRES_DB: servisgadget
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servisgadget -d servisgadget"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: servisgadget_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: servisgadget_backend
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm run prisma:generate && npm run start"

volumes:
  postgres_data:
